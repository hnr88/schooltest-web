<section data-screen-label="Buttons" style="max-width:1240px;margin:0 auto;padding:64px 48px 0">
  <div style="font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#2563EB;margin-bottom:8px">04 · Components</div>
  <h2 style="margin:0 0 24px;font-size:26px;font-weight:700;color:#0E2350">Buttons</h2>
  <div style="background:#FFFFFF;border:1px solid #E3E8F0;border-radius:16px;padding:28px;display:flex;flex-direction:column;gap:26px">
    <div>
      <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#94A3B8;margin-bottom:14px">Variants</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center">
        <button style="display:inline-flex;align-items:center;gap:8px;background:#2563EB;color:#FFFFFF;border:none;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:pointer;box-shadow:0 1px 2px rgba(14,35,80,.08);transition:background .15s" style-hover="background:#1D4ED8">Primary</button>
        <button style="display:inline-flex;align-items:center;gap:8px;background:#0E2350;color:#FFFFFF;border:none;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:pointer;transition:background .15s" style-hover="background:#16326E">Navy</button>
        <button style="display:inline-flex;align-items:center;gap:8px;background:#14B8A6;color:#FFFFFF;border:none;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:pointer;transition:background .15s" style-hover="background:#0D9488">Accent</button>
        <button style="display:inline-flex;align-items:center;gap:8px;background:#EFF5FF;color:#16326E;border:none;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:pointer;transition:background .15s" style-hover="background:#DBEAFE">Secondary</button>
        <button style="display:inline-flex;align-items:center;gap:8px;background:#FFFFFF;color:#16326E;border:1px solid #CBD5E1;font-size:14px;font-weight:600;padding:9px 17px;border-radius:10px;cursor:pointer;transition:background .15s" style-hover="background:#F7F9FC">Outline</button>
        <button style="display:inline-flex;align-items:center;gap:8px;background:transparent;color:#16326E;border:none;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:pointer;transition:background .15s" style-hover="background:#F1F5F9">Ghost</button>
        <button style="display:inline-flex;align-items:center;gap:8px;background:#DC2626;color:#FFFFFF;border:none;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:pointer;transition:background .15s" style-hover="background:#B91C1C">Destructive</button>
        <button style="display:inline-flex;align-items:center;background:none;border:none;color:#2563EB;font-size:14px;font-weight:600;padding:10px 4px;cursor:pointer" style-hover="color:#1D4ED8;text-decoration:underline">Link</button>
      </div>
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#94A3B8;margin-bottom:14px">Sizes · icons · states</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center">
        <button style="display:inline-flex;align-items:center;gap:6px;background:#2563EB;color:#FFFFFF;border:none;font-size:13px;font-weight:600;padding:7px 13px;border-radius:8px;cursor:pointer" style-hover="background:#1D4ED8">Small</button>
        <button style="display:inline-flex;align-items:center;gap:8px;background:#2563EB;color:#FFFFFF;border:none;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:pointer" style-hover="background:#1D4ED8">Default</button>
        <button style="display:inline-flex;align-items:center;gap:8px;background:#2563EB;color:#FFFFFF;border:none;font-size:15px;font-weight:600;padding:13px 26px;border-radius:12px;cursor:pointer" style-hover="background:#1D4ED8">Large</button>
        <button style="display:inline-flex;align-items:center;gap:8px;background:#2563EB;color:#FFFFFF;border:none;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:pointer" style-hover="background:#1D4ED8"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>Create test</button>
        <button style="display:inline-flex;align-items:center;gap:8px;background:#FFFFFF;color:#16326E;border:1px solid #CBD5E1;font-size:14px;font-weight:600;padding:9px 17px;border-radius:10px;cursor:pointer" style-hover="background:#F7F9FC">View results<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg></button>
        <button style="display:inline-grid;place-items:center;width:38px;height:38px;background:#FFFFFF;color:#16326E;border:1px solid #CBD5E1;border-radius:10px;cursor:pointer" style-hover="background:#F7F9FC" aria-label="Settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
        <button style="display:inline-flex;align-items:center;gap:8px;background:#E2E8F0;color:#94A3B8;border:none;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:not-allowed" disabled="{{ true }}">Disabled</button>
        <button style="display:inline-flex;align-items:center;gap:9px;background:#2563EB;color:#FFFFFF;border:none;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:progress;opacity:.85">{{ spinner }}Saving…</button>
      </div>
    </div>
  </div>
</section>
