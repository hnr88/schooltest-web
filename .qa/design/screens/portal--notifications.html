<!-- ===== NOTIFICATIONS ===== -->
    <sc-if value="{{ isNotifs }}" hint-placeholder-val="{{ false }}">
    <div style="display:flex;flex-direction:column;gap:22px;padding:8px 4px 8px 8px;max-width:820px">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px">
        <div>
          <h1 style="margin:0;font-size:30px;font-weight:500;letter-spacing:-0.02em;color:#0E2350">Notifications</h1>
          <p style="margin:6px 0 0;font-size:14px;color:#7C8698">2 unread</p>
        </div>
        <button style="background:transparent;color:#2563EB;font-size:13.5px;font-weight:600;border:none;cursor:pointer;padding:8px 4px">Mark all as read</button>
      </div>
      <div style="background:#FFFFFF;border-radius:24px;padding:6px 28px;box-shadow:0 1px 2px rgba(14,35,80,.04)">
        <div style="font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#9AA6B8;padding:20px 0 4px">Today</div>
        <sc-for list="{{ notifsToday }}" as="n" hint-placeholder-count="2">
          <div style="display:flex;align-items:flex-start;gap:16px;padding:17px 0;border-bottom:1px solid #EEF1F6">
            <span style="width:40px;height:40px;border-radius:12px;background:{{ n.iconBg }};color:{{ n.iconFg }};display:grid;place-items:center;flex:none;font-size:13px;font-weight:700">{{ n.glyph }}</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:14.5px;font-weight:600;color:#0E2350">{{ n.title }}</div>
              <div style="font-size:13px;color:#7C8698;margin-top:2px;line-height:1.5">{{ n.text }}</div>
              <div style="font-size:12px;color:#9AA6B8;margin-top:5px">{{ n.time }}</div>
            </div>
            <span style="width:8px;height:8px;border-radius:999px;background:{{ n.dot }};flex:none;margin-top:6px"></span>
          </div>
        </sc-for>
        <div style="font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#9AA6B8;padding:20px 0 4px">Earlier</div>
        <sc-for list="{{ notifsEarlier }}" as="n" hint-placeholder-count="3">
          <div style="display:flex;align-items:flex-start;gap:16px;padding:17px 0;border-bottom:1px solid #EEF1F6">
            <span style="width:40px;height:40px;border-radius:12px;background:{{ n.iconBg }};color:{{ n.iconFg }};display:grid;place-items:center;flex:none;font-size:13px;font-weight:700">{{ n.glyph }}</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:14.5px;font-weight:600;color:#0E2350">{{ n.title }}</div>
              <div style="font-size:13px;color:#7C8698;margin-top:2px;line-height:1.5">{{ n.text }}</div>
              <div style="font-size:12px;color:#9AA6B8;margin-top:5px">{{ n.time }}</div>
            </div>
            <span style="width:8px;height:8px;border-radius:999px;background:{{ n.dot }};flex:none;margin-top:6px"></span>
          </div>
        </sc-for>
        <div style="padding:6px 0 14px"></div>
      </div>
    </div>
    </sc-if>
