<section data-screen-label="Dark mode" style="max-width:1240px;margin:0 auto;padding:64px 48px 96px">
  <div style="font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#2563EB;margin-bottom:8px">18 · Modes</div>
  <h2 style="margin:0 0 24px;font-size:26px;font-weight:700;color:#0E2350">Dark mode</h2>
  <div style="background:#0B1226;border-radius:16px;padding:32px;display:flex;flex-direction:column;gap:26px">
    <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center">
      <button style="display:inline-flex;align-items:center;gap:8px;background:#3B82F6;color:#FFFFFF;border:none;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:pointer" style-hover="background:#2563EB">Primary</button>
      <button style="display:inline-flex;align-items:center;gap:8px;background:#1A2A4E;color:#C7D6F2;border:none;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:pointer" style-hover="background:#223154">Secondary</button>
      <button style="display:inline-flex;align-items:center;gap:8px;background:transparent;color:#C7D6F2;border:1px solid #2C3D66;font-size:14px;font-weight:600;padding:9px 17px;border-radius:10px;cursor:pointer" style-hover="background:#17233F">Outline</button>
      <button style="display:inline-flex;align-items:center;gap:8px;background:#2DD4BF;color:#06251F;border:none;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:pointer" style-hover="background:#14B8A6">Accent</button>
      <span style="font-size:12.5px;font-weight:600;color:#5EEAD4;background:rgba(45,212,191,.14);padding:4px 11px;border-radius:999px">Accent badge</span>
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#86EFAC;background:rgba(34,197,94,.14);padding:4px 11px;border-radius:999px"><span style="width:6px;height:6px;border-radius:50%;background:#22C55E"></span>Live</span>
    </div>
    <div style="display:grid;grid-template-columns:280px 1fr 1fr;gap:20px;align-items:start">
      <div style="display:flex;flex-direction:column;gap:7px">
        <label style="font-size:13.5px;font-weight:600;color:#E6ECF7">Test name</label>
        <input type="text" placeholder="e.g. Midterm Algebra" style="width:100%;box-sizing:border-box;padding:10px 13px;border-radius:10px;border:1px solid #2C3D66;font-size:14px;color:#E6ECF7;background:#111B33;outline:none;transition:border-color .15s, box-shadow .15s" style-focus="border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.22)" />
        <span style="font-size:12.5px;color:#8FA3C7">Helper text on dark surfaces.</span>
      </div>
      <div style="background:#111B33;border:1px solid #223154;border-radius:14px;padding:20px">
        <div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px;font-weight:500;color:#8FA3C7">Average score</span><span style="display:inline-grid;place-items:center;width:32px;height:32px;border-radius:9px;background:#1A2A4E"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"></path><path d="M18 17V9"></path><path d="M13 17V5"></path><path d="M8 17v-3"></path></svg></span></div>
        <div style="font-size:30px;font-weight:700;letter-spacing:-0.02em;color:#E6ECF7;margin-top:8px">85%</div>
        <div style="margin-top:10px;height:6px;border-radius:999px;background:#17233F;overflow:hidden"><div style="width:85%;height:100%;border-radius:999px;background:linear-gradient(90deg,#3B82F6,#2DD4BF)"></div></div>
      </div>
      <div style="display:flex;gap:12px;align-items:flex-start;background:rgba(59,130,246,.10);border:1px solid rgba(59,130,246,.35);border-radius:12px;padding:14px 16px">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#60A5FA" stroke-width="2.2" stroke-linecap="round" style="flex:none;margin-top:1px"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
        <div><div style="font-size:14px;font-weight:600;color:#E6ECF7">Heads up</div><div style="font-size:13.5px;color:#A9BADC;margin-top:2px">Dark alert on token <span style="font-family:ui-monospace,Menlo,monospace;font-size:12px">--secondary</span>.</div></div>
      </div>
    </div>
  </div>
</section>

<!-- ============ LIVE DIALOG ============ -->
<sc-if value="{{ dialogOpen }}" hint-placeholder-val="{{ false }}">
  <div onClick="{{ closeDialog }}" style="position:fixed;inset:0;background:rgba(10,26,60,.45);backdrop-filter:blur(2px);display:grid;place-items:center;z-index:90;animation:st-fade-in .18s ease">
    <div onClick="{{ stopProp }}" style="background:#FFFFFF;border-radius:16px;box-shadow:0 28px 64px rgba(14,35,80,.3);padding:24px;width:380px;max-width:calc(100vw - 48px);box-sizing:border-box;animation:st-pop-in .18s ease">
      <div style="display:flex;align-items:flex-start;justify-content:space-between"><span style="font-size:17px;font-weight:700;color:#0E2350">Delete this test?</span><button onClick="{{ closeDialog }}" style="display:inline-grid;place-items:center;width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:#64748B;cursor:pointer" style-hover="background:#F1F5F9" aria-label="Close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg></button></div>
      <p style="margin:8px 0 0;font-size:14px;line-height:1.55;color:#64748B">"History Exam" and its 26 responses will be permanently removed. This can't be undone.</p>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px">
        <button onClick="{{ closeDialog }}" style="background:#FFFFFF;color:#16326E;border:1px solid #CBD5E1;font-size:13.5px;font-weight:600;padding:8px 15px;border-radius:9px;cursor:pointer" style-hover="background:#F7F9FC">Cancel</button>
        <button onClick="{{ closeDialog }}" style="background:#DC2626;color:#FFFFFF;border:none;font-size:13.5px;font-weight:600;padding:9px 16px;border-radius:9px;cursor:pointer" style-hover="background:#B91C1C">Delete test</button>
      </div>
    </div>
  </div>
</sc-if>

<!-- ============ LIVE TOAST ============ -->
<sc-if value="{{ toastVisible }}" hint-placeholder-val="{{ false }}">
  <div style="position:fixed;right:24px;bottom:24px;z-index:95;display:flex;align-items:center;gap:12px;background:#0E2350;color:#FFFFFF;padding:14px 16px;border-radius:12px;box-shadow:0 16px 40px rgba(14,35,80,.35);animation:st-toast-in .25s ease;max-width:340px">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#2DD4BF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>
    <div style="flex:1"><div style="font-size:13.5px;font-weight:600">Test published</div><div style="font-size:12.5px;color:#A9BADC;margin-top:1px">Science Quiz shared with 28 students.</div></div>
    <button onClick="{{ hideToast }}" style="display:inline-grid;place-items:center;width:26px;height:26px;border-radius:7px;border:none;background:transparent;color:#8FA3C7;cursor:pointer;flex:none" style-hover="background:#16326E" aria-label="Dismiss"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg></button>
  </div>
</sc-if>
