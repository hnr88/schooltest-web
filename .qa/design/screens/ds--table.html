<section data-screen-label="Table" style="max-width:1240px;margin:0 auto;padding:64px 48px 0">
  <div style="font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#2563EB;margin-bottom:8px">09 · Components</div>
  <h2 style="margin:0 0 24px;font-size:26px;font-weight:700;color:#0E2350">Table &amp; pagination</h2>
  <div style="background:#FFFFFF;border:1px solid #E3E8F0;border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(14,35,80,.05)">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #EEF2F7">
      <span style="font-size:16px;font-weight:600;color:#0E2350">Recent tests</span>
      <button style="display:inline-flex;align-items:center;gap:6px;background:#EFF5FF;color:#16326E;border:none;font-size:13px;font-weight:600;padding:7px 13px;border-radius:9px;cursor:pointer" style-hover="background:#DBEAFE">Export</button>
    </div>
    <div style="display:grid;grid-template-columns:2.2fr 1.2fr .8fr .8fr .9fr .5fr;padding:10px 22px;background:#F8FAFD;border-bottom:1px solid #EEF2F7;font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#94A3B8">
      <span>Test</span><span>Date</span><span>Questions</span><span>Avg</span><span>Status</span><span></span>
    </div>
    <sc-for list="{{ tableRows }}" as="row" hint-placeholder-count="4">
      <div style="display:grid;grid-template-columns:2.2fr 1.2fr .8fr .8fr .9fr .5fr;align-items:center;padding:14px 22px;border-bottom:1px solid #F1F5F9;font-size:14px;transition:background .12s" style-hover="background:#F8FAFD">
        <span style="display:flex;align-items:center;gap:10px"><span style="display:inline-grid;place-items:center;width:30px;height:30px;border-radius:9px;background:{{ row.iconBg }}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="{{ row.iconColor }}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path><path d="M14 2v4a2 2 0 0 0 2 2h4"></path></svg></span><span style="font-weight:600;color:#0E2350">{{ row.name }}</span></span>
        <span style="color:#64748B">{{ row.date }}</span>
        <span style="color:#64748B">{{ row.q }}</span>
        <span style="font-weight:600;color:#0E2350">{{ row.avg }}</span>
        <span><span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:{{ row.stColor }};background:{{ row.stBg }};padding:3px 10px;border-radius:999px"><span style="width:6px;height:6px;border-radius:50%;background:{{ row.stDot }}"></span>{{ row.status }}</span></span>
        <span style="text-align:right"><button style="display:inline-grid;place-items:center;width:30px;height:30px;border-radius:8px;border:none;background:transparent;color:#64748B;cursor:pointer" style-hover="background:#F1F5F9" aria-label="Row actions"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.6"></circle><circle cx="12" cy="12" r="1.6"></circle><circle cx="19" cy="12" r="1.6"></circle></svg></button></span>
      </div>
    </sc-for>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 22px">
      <span style="font-size:13px;color:#94A3B8">Showing 1–4 of 12</span>
      <div style="display:flex;gap:6px;align-items:center">
        <button style="display:inline-grid;place-items:center;width:32px;height:32px;border-radius:8px;border:1px solid #E3E8F0;background:#FFFFFF;color:#94A3B8;cursor:pointer" style-hover="background:#F7F9FC" aria-label="Previous"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg></button>
        <button style="display:inline-grid;place-items:center;width:32px;height:32px;border-radius:8px;border:none;background:#2563EB;color:#FFFFFF;font-size:13px;font-weight:600;cursor:pointer">1</button>
        <button style="display:inline-grid;place-items:center;width:32px;height:32px;border-radius:8px;border:1px solid #E3E8F0;background:#FFFFFF;color:#475569;font-size:13px;font-weight:600;cursor:pointer" style-hover="background:#F7F9FC">2</button>
        <button style="display:inline-grid;place-items:center;width:32px;height:32px;border-radius:8px;border:1px solid #E3E8F0;background:#FFFFFF;color:#475569;font-size:13px;font-weight:600;cursor:pointer" style-hover="background:#F7F9FC">3</button>
        <span style="color:#94A3B8;font-size:13px;padding:0 4px">…</span>
        <button style="display:inline-grid;place-items:center;width:32px;height:32px;border-radius:8px;border:1px solid #E3E8F0;background:#FFFFFF;color:#475569;cursor:pointer" style-hover="background:#F7F9FC" aria-label="Next"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg></button>
      </div>
    </div>
  </div>
</section>
