services:
  schooltest-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:1337}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    image: ${DOCKER_IMAGE:-schooltest-web:latest}
    container_name: ${CONTAINER_NAME:-schooltest-web}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    networks:
      coolify:

networks:
  coolify:
    external: true
    name: coolify
