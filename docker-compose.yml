services:
  schooltest-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:1337}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        PORT_INTERNAL: ${PORT_INTERNAL:-28721}
    image: ${DOCKER_IMAGE:-schooltest-web:latest}
    restart: unless-stopped
    environment:
      PORT: ${PORT_INTERNAL:-28721}
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:${PORT_INTERNAL:-28721}:${PORT_INTERNAL:-28721}"
